name: Bug report
description: Report a reproducible bug in setup, scripts, compose files, or documented usage
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Please provide enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Brief description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact commands and sequence
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / error
      description: Include full error output when possible
    validations:
      required: true
  - type: dropdown
    id: gpu
    attributes:
      label: GPU type
      options:
        - NVIDIA
        - AMD
        - CPU-only
    validations:
      required: true
  - type: input
    id: host_os
    attributes:
      label: Host OS version
      placeholder: e.g., Windows 11 23H2
    validations:
      required: true
  - type: input
    id: wsl
    attributes:
      label: WSL version
      placeholder: e.g., WSL2 / kernel version
    validations:
      required: true
  - type: input
    id: docker
    attributes:
      label: Docker version
      placeholder: e.g., Docker 27.x
    validations:
      required: true
  - type: input
    id: compose
    attributes:
      label: Docker Compose version
      placeholder: e.g., docker compose v2.x
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs (sanitize secrets)
      render: shell
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched for existing issues before opening this report
          required: true
        - label: I can reproduce this issue with the current repository state
          required: true
