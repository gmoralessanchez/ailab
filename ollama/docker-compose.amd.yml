name: thinkexponential-ailab-ollama

# ThinkExponential AILab — Ollama + Open WebUI — AMD GPU (ROCm)
#
# Prerequisites (WSL2 + Windows):
#   1. WSL2 with kernel 5.15+ (`wsl --update`)
#   2. AMD ROCm driver inside WSL2 (ROCm 6.x recommended):
#        https://rocm.docs.amd.com/projects/install-on-linux/en/latest/
#   3. Verify GPU visibility: `rocminfo` or `ls /dev/dri`
#   4. Docker Engine in WSL2 (Docker Desktop may not expose /dev/kfd correctly)
#
# Supported AMD GPUs: RX 6000/7000 series, Instinct MI series
# Note: ROCm on WSL2 is in active development; verify your GPU is on the support list:
#   https://rocm.docs.amd.com/en/latest/compatibility/compatibility-matrix.html
#
# Usage:
#   docker compose -f docker-compose.amd.yml up -d
#
# Pull a model (after containers are running):
#   docker exec -it ollama ollama pull llama3.3
#   docker exec -it ollama ollama pull mistral
#   docker exec -it ollama ollama pull gemma3
#   docker exec -it ollama ollama pull deepseek-r1
#   docker exec -it ollama ollama pull qwen2.5
#   docker exec -it ollama ollama pull phi4
#
# Open WebUI is available at http://localhost:3000

services:
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open_webui_data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  ollama_data:
  open_webui_data:
