#
# Usage:
#   docker compose -f moneyprinter/docker-compose.cpu.yml up -d
#
# Ports:
#   8501 — Streamlit WebUI
#   8080 — FastAPI REST API
#

name: thinkexponential-ailab-moneyprinter

services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moneyprinter-webui
    ports:
      - "8501:8501"
    volumes:
      - ./config.toml:/app/config.toml
      - mp_storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      streamlit run ./webui/Main.py
        --server.address=0.0.0.0
        --server.enableCORS=true
        --browser.gatherUsageStats=false
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moneyprinter-api
    ports:
      - "8080:8080"
    volumes:
      - ./config.toml:/app/config.toml
      - mp_storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python3 main.py
    restart: unless-stopped

volumes:
  mp_storage:
